<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription | AcadWrite+</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="site-header" id="site-header"></header>

<main class="container">
  <h1>Creer un compte</h1>
  <div id="alert-box"></div>
  <div class="card">
    <form class="form" id="register-form">
      <div class="field">
        <label for="name">Nom complet</label>
        <input type="text" id="name" name="name" autocomplete="name" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="new-password" minlength="6" required>
        <span class="hint">6 caracteres minimum</span>
      </div>
      <div class="field">
        <label for="level">Niveau</label>
        <select id="level" name="level">
          <option value="licence">Licence</option>
          <option value="master">Master</option>
          <option value="doctorat">Doctorat</option>
          <option value="enseignant">Enseignant</option>
          <option value="libre" selected>Libre / autre</option>
        </select>
      </div>
      <button type="submit" class="btn">S'inscrire</button>
    </form>
    <p class="small mt-1">Deja un compte ? <a href="/login.html">Connectez-vous</a></p>
  </div>
</main>

<footer class="site-footer">AcadWrite+ &mdash; Plateforme d'aide academique pour le contexte universitaire algerien.</footer>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/motion.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
