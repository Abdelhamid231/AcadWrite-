<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant IA | AcadWrite+</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="site-header" id="site-header"></header>

<main class="container">
  <h1>Assistant IA</h1>
  <p class="muted">Reformulation academique, resume, generation de bibliographie, proposition de titres, explication de concepts methodologiques.</p>
  <div id="alert-box"></div>

  <div class="tabs" id="mode-tabs">
    <button type="button" data-mode="chat" class="active">Discussion libre</button>
    <button type="button" data-mode="reformulation">Reformulation</button>
    <button type="button" data-mode="resume">Resume</button>
    <button type="button" data-mode="bibliographie">Bibliographie</button>
    <button type="button" data-mode="titres">Proposition de titres</button>
    <button type="button" data-mode="concepts">Concepts methodologiques</button>
  </div>

  <div class="card">
    <div class="chat-window" id="chat-window"></div>
    <div id="attachment-chip-row"></div>
    <div class="chat-input-row">
      <label class="attach-btn" title="Joindre un fichier (txt, pdf, docx)">
        📎
        <input type="file" id="file-input" accept=".txt,.pdf,.docx" hidden>
      </label>
      <textarea id="chat-input" placeholder="Ecrivez votre message, ou joignez un fichier a analyser..."></textarea>
      <button type="button" class="btn" id="send-btn">Envoyer</button>
    </div>
  </div>
</main>

<footer class="site-footer">AcadWrite+ &mdash; Plateforme d'aide academique pour le contexte universitaire algerien.</footer>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/motion.js"></script>
<script src="/js/assistant.js"></script>
</body>
</html>
